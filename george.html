<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>TopDJs · Calendario George</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#000;--card:#050b18;--field:#00030a;--text:#fff;--muted:#b8c7d9;--accent:#00b8ff;--green:#2cff9a;--yellow:#ffe66d;--border:#008ee6;--red:#ff5f7c}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(0,184,255,.12),transparent 28%),#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid rgba(0,184,255,.5);box-shadow:0 0 22px rgba(0,184,255,.15);flex-wrap:wrap}
header img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(0,184,255,.55))}
h1{margin:0;font-size:25px}
.sub{margin:5px 0 0;color:#35d7ff;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
main{padding:20px;max-width:1280px;margin:0 auto}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:0 0 18px}
button,select{padding:10px 14px;border-radius:12px;border:1px solid rgba(0,184,255,.7);background:linear-gradient(180deg,#1fd0ff,#008ee6);color:#00111d;font-weight:950;cursor:pointer}
button.secondary,select{background:#00030a;color:#fff}
select{min-width:210px}
.monthTitle{font-size:30px;margin:0 0 16px;text-shadow:0 0 12px rgba(0,184,255,.28)}
.summary{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px;margin:0 0 18px}
.sumCard{border-radius:18px;padding:16px;background:linear-gradient(180deg,rgba(5,11,24,.98),rgba(0,0,0,.98));border:1px solid rgba(0,184,255,.55);box-shadow:0 0 18px rgba(0,184,255,.14)}
.sumCard span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}
.sumCard strong{display:block;font-size:30px;margin-top:6px}
.sumCard.confirmed{border-color:rgba(44,255,154,.75)}.sumCard.confirmed strong{color:#8dffc4}
.sumCard.pending{border-color:rgba(255,217,61,.75)}.sumCard.pending strong{color:#ffe66d}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.dayHeader{text-align:center;color:#7ee7ff;font-weight:950;letter-spacing:.08em;font-size:12px;padding:8px 4px}
.day{min-height:132px;border:1px solid rgba(0,184,255,.35);border-radius:16px;background:linear-gradient(180deg,rgba(5,11,24,.92),rgba(0,0,0,.98));padding:10px;overflow:hidden}
.day.outside{opacity:.35}.day.today{border-color:#2cff9a;box-shadow:0 0 20px rgba(44,255,154,.18)}
.dayNum{display:flex;justify-content:space-between;align-items:center;color:#fff;font-weight:950;margin-bottom:8px}
.todayMark{font-size:10px;color:#8dffc4;border:1px solid rgba(44,255,154,.6);border-radius:999px;padding:2px 6px}
.eventPill{display:block;width:100%;border:1px solid rgba(0,184,255,.42);border-left-width:4px;border-radius:10px;padding:7px 8px;margin:6px 0;background:rgba(0,184,255,.07);color:#fff;text-align:left;font-size:12px;line-height:1.25}
.eventPill.confirmed{border-left-color:#2cff9a}.eventPill.pending{border-left-color:#ffe66d}
.eventPill strong{display:block;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.eventPill.confirmed strong{color:#8dffc4}.eventPill.pending strong{color:#ffe66d}
.eventPill span{display:block;color:#d7e9f5;margin-top:2px;white-space:normal;word-break:break-word}
.empty{border:1px dashed rgba(0,184,255,.5);border-radius:18px;padding:24px;color:var(--muted);text-align:center;margin-top:18px}
@media(max-width:900px){.calendar{grid-template-columns:1fr}.dayHeader{display:none}.summary{grid-template-columns:1fr}.toolbar{display:grid;grid-template-columns:1fr}.toolbar button,.toolbar select{width:100%}}
@media print{
  @page{size:letter;margin:10mm}
  body{background:#fff;color:#172033}
  header,.toolbar{display:none}
  main{padding:0;max-width:none}
  .monthTitle{color:#172033;text-shadow:none;border-bottom:2px solid #00a2ff;padding-bottom:8px}
  .summary{grid-template-columns:repeat(3,1fr)}
  .sumCard,.day{box-shadow:none;background:#fff;border-color:#d8e4ef;color:#172033}
  .sumCard span{color:#334155}.sumCard strong,.dayNum{color:#172033}
  .dayHeader{color:#334155}
  .calendar{gap:5px}
  .day{min-height:105px;border-radius:8px;padding:7px}
  .eventPill{background:#f8fbff;color:#172033;border-color:#cfe3f5;font-size:10px}
  .eventPill span{color:#172033}
}
</style>
</head>
<body>
<header>
  <img src="topdjs-logo.png" alt="TopDJs">
  <div>
    <h1>Calendario Operativo</h1>
    <p class="sub">George · Bodega · Operación</p>
  </div>
</header>

<main>
  <div class="toolbar">
    <button id="prev">← MES</button>
    <button id="today" class="secondary">HOY</button>
    <button id="next">MES →</button>
    <select id="statusFilter">
      <option value="all">Confirmados y pendientes</option>
      <option value="confirmed">Solo confirmados</option>
      <option value="pending">Solo pendientes</option>
    </select>
    <button id="copy">COPIAR PARA WHATSAPP</button>
    <button id="print" class="secondary">IMPRIMIR / PDF</button>
  </div>

  <h2 id="monthTitle" class="monthTitle"></h2>
  <div id="summary" class="summary"></div>
  <div id="calendar" class="calendar"></div>
</main>

<script>
const SUPABASE_URL="https://xbrsnmbmkbvxyhrtiywy.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhicnNubWJta2J2eHlocnRpeXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTUwMzYsImV4cCI6MjA5Njc5MTAzNn0.ULJh4UYoaNLsirKnRQ4TmIbv-L5kzWwWWEFwIsFI02Y";
const MONTHS=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
const DAYS=["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"];
let visibleDate=new Date();
let records=[];
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
function normalizeStatus(raw){const s=String(raw||"").trim().toUpperCase();if(!s||s==="EN SEGUIMIENTO")return "COTIZADO";if(s==="PAGADO")return "LIQUIDADO";if(s==="ANTICIPO RECIBIDO")return "CONFIRMADO CON ANTICIPO";if(s==="CONFIRMADO")return "CONFIRMADO SIN ANTICIPO";return s}
function statusLabel(status){const s=normalizeStatus(status);if(s==="COTIZADO")return "PENDIENTE";if(["CONFIRMADO SIN ANTICIPO","CONFIRMADO CON ANTICIPO","LIQUIDADO"].includes(s))return "CONFIRMADO";return s}
function isVisibleEvent(r){const s=normalizeStatus(r.status);return !r._deleted&&r.date&&["COTIZADO","CONFIRMADO SIN ANTICIPO","CONFIRMADO CON ANTICIPO","LIQUIDADO"].includes(s)}
function eventName(r){return [r.client||"",r.project||r.event_type||""].filter(Boolean).join(" · ") || "Evento TopDJs"}
function dateKey(d){return d.toISOString().slice(0,10)}
function dateLabel(dateStr){try{const d=new Date(String(dateStr)+"T12:00:00");return d.toLocaleDateString("es-MX",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}).replace(/\./g,"")}catch(e){return dateStr||""}}
async function loadRecords(){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/topdjs_records?select=*&order=date.asc`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});
  if(!res.ok)throw new Error(await res.text());
  records=await res.json();
  render();
}
function currentEvents(){
  const y=visibleDate.getFullYear(),m=visibleDate.getMonth(),filter=$("statusFilter").value;
  return records.filter(isVisibleEvent).filter(r=>{
    const d=new Date(String(r.date)+"T00:00:00");
    return d.getFullYear()===y&&d.getMonth()===m;
  }).filter(r=>filter==="all"||statusLabel(r.status)===(filter==="confirmed"?"CONFIRMADO":"PENDIENTE"))
    .sort((a,b)=>String(a.date||"").localeCompare(String(b.date||""))||String(a.start_time||"").localeCompare(String(b.start_time||""))||eventName(a).localeCompare(eventName(b)));
}
function calendarText(){
  const events=currentEvents();
  const confirmed=events.filter(r=>statusLabel(r.status)==="CONFIRMADO").length;
  const pending=events.filter(r=>statusLabel(r.status)==="PENDIENTE").length;
  const lines=[`CALENDARIO TOPDJS · ${MONTHS[visibleDate.getMonth()]} ${visibleDate.getFullYear()}`,`Eventos: ${events.length} · Confirmados: ${confirmed} · Pendientes: ${pending}`,``];
  if(!events.length){lines.push("Sin eventos confirmados o pendientes en este mes.");return lines.join("\n")}
  events.forEach((r,i)=>{lines.push(`${i+1}. ${dateLabel(r.date)} · ${statusLabel(r.status)} · ${eventName(r)}`)});
  return lines.join("\n");
}
function render(){
  const y=visibleDate.getFullYear(),m=visibleDate.getMonth();
  $("monthTitle").textContent=`${MONTHS[m]} ${y}`;
  const events=currentEvents();
  const confirmed=events.filter(r=>statusLabel(r.status)==="CONFIRMADO").length;
  const pending=events.filter(r=>statusLabel(r.status)==="PENDIENTE").length;
  $("summary").innerHTML=`<div class="sumCard"><span>Eventos</span><strong>${events.length}</strong></div><div class="sumCard confirmed"><span>Confirmados</span><strong>${confirmed}</strong></div><div class="sumCard pending"><span>Pendientes</span><strong>${pending}</strong></div>`;
  const first=new Date(y,m,1);
  const start=new Date(first);
  const offset=(first.getDay()+6)%7;
  start.setDate(first.getDate()-offset);
  const today=dateKey(new Date());
  const byDate={};
  events.forEach(r=>{(byDate[r.date]||(byDate[r.date]=[])).push(r)});
  let html=DAYS.map(d=>`<div class="dayHeader">${d}</div>`).join("");
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const key=dateKey(d);
    const outside=d.getMonth()!==m;
    const dayEvents=byDate[key]||[];
    html+=`<div class="day ${outside?"outside":""} ${key===today?"today":""}"><div class="dayNum"><span>${d.getDate()}</span>${key===today?'<span class="todayMark">HOY</span>':""}</div>${dayEvents.map(r=>{const st=statusLabel(r.status);return `<div class="eventPill ${st==="CONFIRMADO"?"confirmed":"pending"}"><strong>${esc(st)}</strong><span>${esc(eventName(r))}</span></div>`}).join("")}</div>`;
  }
  $("calendar").innerHTML=html;
}
$("prev").onclick=()=>{visibleDate.setMonth(visibleDate.getMonth()-1);render()};
$("next").onclick=()=>{visibleDate.setMonth(visibleDate.getMonth()+1);render()};
$("today").onclick=()=>{visibleDate=new Date();render()};
$("statusFilter").onchange=render;
$("print").onclick=()=>window.print();
$("copy").onclick=async()=>{const text=calendarText();try{await navigator.clipboard.writeText(text);alert("Calendario copiado.")}catch(e){prompt("Copia el calendario",text)}};
loadRecords().catch(e=>{$("calendar").innerHTML=`<div class="empty">No se pudo cargar Supabase: ${esc(e.message)}</div>`});
</script>
</body>
</html>
