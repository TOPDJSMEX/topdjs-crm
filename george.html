<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>TopDJs · Calendario George</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#000;--card:#050b18;--field:#00030a;--text:#fff;--muted:#b8c7d9;--accent:#00b8ff;--green:#2cff9a;--yellow:#ffe66d;--red:#ff5f7c;--border:#008ee6}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(0,184,255,.12),transparent 28%),#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 22px;border-bottom:1px solid rgba(0,184,255,.5);box-shadow:0 0 22px rgba(0,184,255,.15);flex-wrap:wrap}.brand{display:flex;align-items:center;gap:14px}.brand img{width:66px;height:66px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(0,184,255,.55))}h1{margin:0;font-size:25px}.sub{margin:5px 0 0;color:#35d7ff;font-weight:900;letter-spacing:.08em;text-transform:uppercase}main{padding:20px;max-width:1280px;margin:0 auto}button,.button{padding:10px 14px;border-radius:12px;border:1px solid rgba(0,184,255,.7);background:linear-gradient(180deg,#1fd0ff,#008ee6);color:#00111d;font-weight:950;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}.secondary{background:linear-gradient(180deg,#071325,#02060d);color:#fff}.green{background:linear-gradient(180deg,#b9ffd7,#2cff9a);border-color:#9fffd0;color:#00180b}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:0 0 18px}select,input{background:#00030a;color:#fff;border:1px solid rgba(0,184,255,.55);border-radius:10px;padding:10px}.notice{border:1px solid rgba(44,255,154,.65);background:rgba(44,255,154,.08);border-radius:16px;padding:14px;margin:0 0 18px;color:#8dffc4;font-weight:900}.summary{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:12px;margin:0 0 18px}.sumCard{border-radius:18px;padding:16px;background:linear-gradient(180deg,rgba(5,11,24,.98),rgba(0,0,0,.98));border:1px solid rgba(0,184,255,.55);box-shadow:0 0 18px rgba(0,184,255,.14)}.sumCard span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}.sumCard strong{display:block;font-size:30px;margin-top:6px}.sumCard.confirmed{border-color:rgba(44,255,154,.75)}.sumCard.confirmed strong{color:#8dffc4}.sumCard.pending{border-color:rgba(255,217,61,.75)}.sumCard.pending strong{color:#ffe66d}.monthTitle{font-size:30px;margin:0 0 16px;text-shadow:0 0 12px rgba(0,184,255,.28)}.events{display:grid;gap:14px}.event{border:1px solid rgba(0,184,255,.45);border-radius:18px;padding:16px;background:linear-gradient(180deg,rgba(5,11,24,.92),rgba(0,0,0,.98));box-shadow:0 0 18px rgba(0,184,255,.13)}.eventTop{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid rgba(0,184,255,.24);padding-bottom:10px;margin-bottom:10px}.date{font-weight:950;color:#7ee7ff}.badge{border-radius:999px;padding:6px 10px;font-size:11px;font-weight:950;border:1px solid rgba(0,184,255,.7);background:rgba(0,184,255,.10);color:#7ee7ff}.badge.pending{border-color:rgba(255,217,61,.8);background:rgba(255,217,61,.10);color:#ffe66d}.badge.confirmed{border-color:rgba(44,255,154,.8);background:rgba(44,255,154,.10);color:#8dffc4}.event h2{margin:0 0 8px;font-size:22px}p{color:var(--muted);margin:6px 0}strong{color:#fff}ul{margin:8px 0 0;padding-left:20px;color:var(--muted)}li{margin:3px 0}.empty{border:1px dashed rgba(0,184,255,.5);border-radius:18px;padding:24px;color:var(--muted);text-align:center}@media(max-width:760px){header{display:block}.brand{margin-bottom:12px}.toolbar{display:grid;grid-template-columns:1fr}.toolbar button,.toolbar a,.toolbar select{width:100%}.summary{grid-template-columns:1fr}}
@media print{body{background:#fff;color:#172033}header,.toolbar,.notice{display:none}main{padding:0}.monthTitle{color:#172033;text-shadow:none;border-bottom:2px solid #00a2ff;padding-bottom:8px}.summary{grid-template-columns:repeat(3,1fr)}.sumCard,.event{box-shadow:none;background:#fff;border-color:#d8e4ef;color:#172033;page-break-inside:avoid}.sumCard span,p,ul,li{color:#334155}strong,.event h2{color:#172033}.badge{color:#006db8;background:#f2f9ff}.badge.pending{color:#856600;background:#fff8dc}.badge.confirmed{color:#087a44;background:#e9fff3}}
</style>
</head>
<body>
<header><div class="brand"><img src="topdjs-logo.png" alt="TopDJs"><div><h1>Calendario Operativo</h1><p class="sub">George · Bodega · Operación</p></div></div><div><a class="button secondary" href="index.html">← CRM</a></div></header>
<main>
  <div class="notice">Vista sin costos: no muestra montos, anticipos, saldos ni utilidad.</div>
  <div class="toolbar"><button id="prev">← MES</button><button id="today" class="secondary">HOY</button><button id="next">MES →</button><select id="statusFilter"><option value="all">Confirmados y pendientes</option><option value="confirmed">Solo confirmados</option><option value="pending">Solo pendientes</option></select><button id="copy" class="green">COPIAR PARA WHATSAPP</button><button id="print" class="secondary">IMPRIMIR / PDF</button></div>
  <h2 id="monthTitle" class="monthTitle"></h2>
  <div id="summary" class="summary"></div>
  <div id="events" class="events"></div>
</main>
<script>
const SUPABASE_URL="https://xbrsnmbmkbvxyhrtiywy.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhicnNubWJta2J2eHlocnRpeXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTUwMzYsImV4cCI6MjA5Njc5MTAzNn0.ULJh4UYoaNLsirKnRQ4TmIbv-L5kzWwWWEFwIsFI02Y";
const MONTHS=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
let visibleDate=new Date();let records=[];
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
function parseMaybeJson(v){if(!v)return v;if(typeof v==="object")return v;try{return JSON.parse(v)}catch(e){return v}}
function normalizeStatus(raw){const s=String(raw||"").trim().toUpperCase();if(!s||s==="EN SEGUIMIENTO")return "COTIZADO";if(s==="PAGADO")return "LIQUIDADO";if(s==="ANTICIPO RECIBIDO")return "CONFIRMADO CON ANTICIPO";if(s==="CONFIRMADO")return "CONFIRMADO SIN ANTICIPO";return s}
function statusLabel(status){const s=normalizeStatus(status);if(s==="COTIZADO")return "PENDIENTE";if(["CONFIRMADO SIN ANTICIPO","CONFIRMADO CON ANTICIPO","LIQUIDADO"].includes(s))return "CONFIRMADO";return s}
function isVisibleEvent(r){const s=normalizeStatus(r.status);return !r._deleted&&r.date&&["COTIZADO","CONFIRMADO SIN ANTICIPO","CONFIRMADO CON ANTICIPO","LIQUIDADO"].includes(s)}
function dateLabel(dateStr){try{const d=new Date(String(dateStr)+"T12:00:00");return d.toLocaleDateString("es-MX",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}).replace(/\./g,"")}catch(e){return dateStr||""}}
function stripEmojiLabel(label=""){return String(label||"").replace(/^[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ0-9]+\s*/g,"").trim()}
function selectedSections(qc){qc=parseMaybeJson(qc);if(!qc||typeof qc!=="object")return[];return Object.entries(qc).map(([rub,d])=>{const selected=Array.isArray(d?.selected)?d.selected:[];const notes=d?.notes||d?.observaciones||"";const items=selected.map(x=>({item:String(x.item||x.name||x.equipo||"").trim(),qty:Number(x.qty||x.cantidad||1)||1})).filter(x=>x.item);return {rub,items,notes}}).filter(s=>s.items.length||s.notes)}
function equipmentLines(qc){return selectedSections(qc).flatMap(sec=>{const out=[];if(sec.items.length)out.push(`${stripEmojiLabel(sec.rub)}: ${sec.items.map(i=>`${i.qty} ${i.item}`).join(", ")}`);if(sec.notes)out.push(`Obs. ${stripEmojiLabel(sec.rub)}: ${sec.notes}`);return out})}
async function loadRecords(){const res=await fetch(`${SUPABASE_URL}/rest/v1/topdjs_records?select=*&order=date.asc`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});if(!res.ok)throw new Error(await res.text());records=await res.json();render()}
function currentEvents(){const y=visibleDate.getFullYear(),m=visibleDate.getMonth(),filter=$("statusFilter").value;return records.filter(isVisibleEvent).filter(r=>{const d=new Date(String(r.date)+"T00:00:00");return d.getFullYear()===y&&d.getMonth()===m}).filter(r=>filter==="all"||statusLabel(r.status)===(filter==="confirmed"?"CONFIRMADO":"PENDIENTE")).sort((a,b)=>String(a.date||"").localeCompare(String(b.date||""))||String(a.start_time||"").localeCompare(String(b.start_time||"")))}
function calendarText(){const events=currentEvents();const confirmed=events.filter(r=>statusLabel(r.status)==="CONFIRMADO").length;const pending=events.filter(r=>statusLabel(r.status)==="PENDIENTE").length;const lines=[`CALENDARIO OPERATIVO TOPDJS · ${MONTHS[visibleDate.getMonth()]} ${visibleDate.getFullYear()}`,`Eventos: ${events.length} · Confirmados: ${confirmed} · Pendientes: ${pending}`,`Sin costos / solo operación y bodega`,``];events.forEach((r,i)=>{lines.push(`${i+1}. ${dateLabel(r.date)} · ${statusLabel(r.status)}`);lines.push(`Cliente: ${r.client||""}`);if(r.project)lines.push(`Evento: ${r.project}`);if(r.venue)lines.push(`Lugar: ${r.venue}`);const data=[r.pax?`${r.pax} pax`:"",r.service_hours?`${r.service_hours} hrs servicio`:"",r.start_time?`inicio ${r.start_time}`:"",r.end_time?`fin ${r.end_time}`:""].filter(Boolean);if(data.length)lines.push(`Datos: ${data.join(" · ")}`);const setup=[r.setup_type||"",r.setup_hours?`${r.setup_hours} hrs montaje`:"",r.setup_time?`hora ${r.setup_time}`:""].filter(Boolean);if(setup.length)lines.push(`Montaje: ${setup.join(" · ")}`);const eq=equipmentLines(r.quote_catalog);if(eq.length){lines.push("Equipo:");eq.forEach(x=>lines.push(`- ${x}`))}if(r.notes)lines.push(`Notas: ${r.notes}`);lines.push("")});if(!events.length)lines.push("Sin eventos en este periodo.");return lines.join("\n")}
function render(){const y=visibleDate.getFullYear(),m=visibleDate.getMonth();$("monthTitle").textContent=`${MONTHS[m]} ${y}`;const events=currentEvents();const confirmed=events.filter(r=>statusLabel(r.status)==="CONFIRMADO").length;const pending=events.filter(r=>statusLabel(r.status)==="PENDIENTE").length;$("summary").innerHTML=`<div class="sumCard"><span>Eventos</span><strong>${events.length}</strong></div><div class="sumCard confirmed"><span>Confirmados</span><strong>${confirmed}</strong></div><div class="sumCard pending"><span>Pendientes</span><strong>${pending}</strong></div>`;$("events").innerHTML=events.length?events.map(r=>{const eq=equipmentLines(r.quote_catalog);const status=statusLabel(r.status);return `<article class="event"><div class="eventTop"><span class="date">${esc(dateLabel(r.date))}</span><span class="badge ${status==="PENDIENTE"?"pending":"confirmed"}">${esc(status)}</span></div><h2>${esc(r.client||"Evento")}</h2><p><strong>Evento:</strong> ${esc(r.project||r.event_type||"")}</p><p><strong>Lugar:</strong> ${esc(r.venue||"")}</p><p><strong>Operación:</strong> ${esc([r.pax?`${r.pax} pax`:"",r.service_hours?`${r.service_hours} hrs`:"",r.start_time?`inicio ${r.start_time}`:"",r.end_time?`fin ${r.end_time}`:""].filter(Boolean).join(" · "))}</p><p><strong>Montaje:</strong> ${esc([r.setup_type||"",r.setup_hours?`${r.setup_hours} hrs`:"",r.setup_time?`hora ${r.setup_time}`:""].filter(Boolean).join(" · "))}</p>${eq.length?`<p><strong>Equipo seleccionado:</strong></p><ul>${eq.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:""}${r.notes?`<p><strong>Notas:</strong> ${esc(r.notes)}</p>`:""}</article>`}).join(""):`<div class="empty">Sin eventos confirmados o pendientes en este mes.</div>`}
$("prev").onclick=()=>{visibleDate.setMonth(visibleDate.getMonth()-1);render()};$("next").onclick=()=>{visibleDate.setMonth(visibleDate.getMonth()+1);render()};$("today").onclick=()=>{visibleDate=new Date();render()};$("statusFilter").onchange=render;$("print").onclick=()=>window.print();$("copy").onclick=async()=>{const text=calendarText();try{await navigator.clipboard.writeText(text);alert("Calendario copiado sin costos")}catch(e){prompt("Copia el calendario",text)}};
loadRecords().catch(e=>{$("events").innerHTML=`<div class="empty">No se pudo cargar Supabase: ${esc(e.message)}</div>`});
</script>
</body>
</html>
